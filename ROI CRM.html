<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROI CRM</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg:#f0f2f5; --sidebar:#1a1f2e; --sidebar2:#252b3b; --accent:#4f6ef7;
  --accent2:#6c8aff; --white:#fff; --border:#e2e8f0; --text:#1e293b;
  --text2:#64748b; --success:#10b981; --warn:#f59e0b; --danger:#ef4444;
  --card:#ffffff; --hover:#f8fafc;
}
body { font-family:'Segoe UI',Arial,sans-serif; background:var(--bg); color:var(--text); display:flex; height:100vh; overflow:hidden; }

.sidebar { width:220px; background:var(--sidebar); display:flex; flex-direction:column; flex-shrink:0; }
.logo { padding:20px 16px; border-bottom:1px solid #2d3548; }
.logo-title { font-size:22px; font-weight:800; color:#fff; }
.logo-sub { font-size:11px; color:#8892b0; }
.nav { flex:1; padding:8px 0; overflow-y:auto; }
.nav-section { padding:8px 16px 4px; font-size:10px; color:#4a5568; text-transform:uppercase; letter-spacing:1px; }
.nav-item { display:flex; align-items:center; gap:10px; padding:10px 16px; cursor:pointer; color:#a0aec0; font-size:13.5px; transition:all .15s; border-right:3px solid transparent; }
.nav-item:hover { background:var(--sidebar2); color:#fff; }
.nav-item.active { background:var(--sidebar2); color:#fff; border-right-color:var(--accent); }
.nav-item .icon { font-size:16px; width:20px; text-align:center; }
.nav-badge { margin-right:auto; background:var(--accent); color:#fff; font-size:10px; padding:1px 6px; border-radius:10px; }
.user-bar { padding:12px 16px; border-top:1px solid #2d3548; display:flex; align-items:center; gap:10px; }
.user-avatar { width:34px; height:34px; border-radius:50%; background:var(--accent); display:flex; align-items:center; justify-content:center; color:#fff; font-weight:700; font-size:14px; flex-shrink:0; }
.user-name { font-size:13px; color:#e2e8f0; font-weight:600; }
.user-role { font-size:11px; color:#718096; }
.main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.topbar { background:var(--white); border-bottom:1px solid var(--border); padding:0 24px; height:56px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.page-title { font-size:18px; font-weight:700; color:var(--text); }
.topbar-actions { display:flex; gap:10px; align-items:center; }
.btn { padding:8px 16px; border-radius:8px; border:none; cursor:pointer; font-size:13px; font-weight:600; display:flex; align-items:center; gap:6px; transition:all .15s; }
.btn-primary { background:var(--accent); color:#fff; }
.btn-primary:hover { background:var(--accent2); }
.btn-secondary { background:var(--hover); color:var(--text2); border:1px solid var(--border); }
.btn-secondary:hover { background:var(--border); }
.btn-sm { padding:5px 10px; font-size:12px; }
.btn-danger { background:#fef2f2; color:var(--danger); border:1px solid #fecaca; }
.btn-success { background:#f0fdf4; color:var(--success); border:1px solid #bbf7d0; }
.btn-icon { padding:6px 8px; }
.content { flex:1; overflow-y:auto; padding:24px; }
.stats-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:24px; }
.stat-card { background:var(--card); border-radius:12px; padding:20px; border:1px solid var(--border); }
.stat-label { font-size:12px; color:var(--text2); margin-bottom:4px; display:flex; align-items:center; gap:6px; }
.stat-value { font-size:28px; font-weight:800; color:var(--text); }
.stat-value.accent { color:var(--accent); }
.stat-value.success { color:var(--success); }
.stat-value.warn { color:var(--warn); }
.stat-value.danger { color:var(--danger); }
.stat-sub { font-size:11px; color:var(--text2); margin-top:4px; }
.dash-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
.dash-card { background:var(--card); border-radius:12px; border:1px solid var(--border); padding:20px; }
.dash-card-title { font-size:14px; font-weight:700; margin-bottom:16px; color:var(--text); }
.status-row { display:flex; align-items:center; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--hover); }
.status-row:last-child { border:none; }
.status-label { font-size:13px; color:var(--text2); display:flex; align-items:center; gap:8px; }
.status-count { font-size:14px; font-weight:700; color:var(--accent); }
.table-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; flex-wrap:wrap; gap:10px; }
.search-box { display:flex; align-items:center; gap:8px; background:var(--white); border:1px solid var(--border); border-radius:8px; padding:8px 12px; min-width:220px; }
.search-box input { border:none; outline:none; font-size:13px; background:transparent; width:100%; }
.table-wrap { background:var(--card); border-radius:12px; border:1px solid var(--border); overflow:hidden; }
table { width:100%; border-collapse:collapse; }
thead th { background:var(--hover); padding:12px 16px; font-size:12px; font-weight:600; color:var(--text2); text-align:right; border-bottom:1px solid var(--border); white-space:nowrap; }
tbody tr { cursor:pointer; transition:background .1s; }
tbody tr:hover { background:var(--hover); }
tbody td { padding:12px 16px; font-size:13px; border-bottom:1px solid var(--hover); }
tbody tr:last-child td { border:none; }
.badge { display:inline-flex; align-items:center; padding:2px 10px; border-radius:20px; font-size:11px; font-weight:600; }
.badge-blue { background:#eff6ff; color:#3b82f6; }
.badge-green { background:#f0fdf4; color:var(--success); }
.badge-yellow { background:#fffbeb; color:var(--warn); }
.badge-red { background:#fef2f2; color:var(--danger); }
.badge-gray { background:var(--hover); color:var(--text2); }
.record-overlay { position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:100; display:none; align-items:stretch; }
.record-overlay.open { display:flex; }
.record-panel { background:var(--bg); width:100%; max-width:1200px; margin:0 auto; display:flex; flex-direction:column; height:100vh; }
.record-topbar { background:var(--white); border-bottom:1px solid var(--border); padding:0 24px; height:56px; display:flex; align-items:center; gap:12px; flex-shrink:0; }
.record-back { cursor:pointer; color:var(--text2); font-size:20px; padding:4px; border-radius:6px; }
.record-back:hover { background:var(--hover); color:var(--text); }
.record-title-bar { flex:1; }
.record-name { font-size:18px; font-weight:700; }
.record-type { font-size:12px; color:var(--text2); }
.record-body { flex:1; display:grid; grid-template-columns:1fr 380px; overflow:hidden; }
.record-fields { padding:24px; overflow-y:auto; border-left:1px solid var(--border); }
.record-notes-col { padding:24px; overflow-y:auto; background:var(--white); }
.field-section { margin-bottom:24px; }
.field-section-title { font-size:13px; font-weight:700; color:var(--text2); margin-bottom:12px; padding-bottom:6px; border-bottom:1px solid var(--border); }
.field-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.field-item { display:flex; flex-direction:column; gap:4px; }
.field-label { font-size:11px; color:var(--text2); font-weight:600; }
.field-value { font-size:13.5px; color:var(--text); padding:8px 10px; background:var(--hover); border-radius:6px; border:1px solid var(--border); min-height:34px; cursor:pointer; }
.field-value:hover { border-color:var(--accent); }
.field-value.editable:focus { outline:none; border-color:var(--accent); background:#fff; }
.field-value.full { grid-column:1/-1; }
.related-section { background:var(--hover); border-radius:10px; padding:16px; margin-bottom:16px; }
.related-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
.related-title { font-size:13px; font-weight:700; color:var(--text); }
.related-count { background:var(--accent); color:#fff; font-size:10px; padding:1px 7px; border-radius:10px; }
.related-list { display:flex; flex-direction:column; gap:8px; }
.related-item { background:var(--white); border-radius:8px; padding:10px 14px; cursor:pointer; border:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.related-item:hover { border-color:var(--accent); }
.related-item-name { font-size:13px; font-weight:600; }
.related-item-sub { font-size:11px; color:var(--text2); }
.related-empty { font-size:12px; color:var(--text2); text-align:center; padding:12px; }
.notes-header { font-size:14px; font-weight:700; margin-bottom:16px; }
.add-note-box { background:var(--hover); border-radius:10px; padding:12px; margin-bottom:16px; border:1px solid var(--border); }
.add-note-box textarea { width:100%; border:none; background:transparent; font-size:13px; resize:none; outline:none; min-height:70px; font-family:inherit; color:var(--text); }
.add-note-actions { display:flex; gap:8px; justify-content:flex-end; margin-top:8px; }
.note-item { background:var(--hover); border-radius:10px; padding:14px; margin-bottom:10px; border-right:3px solid var(--accent); }
.note-text { font-size:13px; color:var(--text); line-height:1.6; }
.note-meta { font-size:11px; color:var(--text2); margin-top:6px; display:flex; gap:10px; }
.note-delete { cursor:pointer; color:var(--danger); }
.add-task-section { background:#f0f4ff; border-radius:10px; padding:14px; margin-bottom:16px; border:1px solid #c7d2fe; }
.add-task-title { font-size:12px; font-weight:700; color:var(--accent); margin-bottom:10px; }
.task-fields { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:8px; }
.task-field-full { grid-column:1/-1; }
.task-input { width:100%; padding:7px 10px; border:1px solid var(--border); border-radius:6px; font-size:12px; font-family:inherit; background:#fff; }
.task-item { background:#fff; border-radius:8px; padding:10px 14px; margin-bottom:8px; border:1px solid var(--border); display:flex; align-items:flex-start; gap:10px; }
.task-check { width:16px; height:16px; cursor:pointer; margin-top:2px; flex-shrink:0; }
.task-info { flex:1; }
.task-name { font-size:13px; font-weight:600; }
.task-name.done { text-decoration:line-through; color:var(--text2); }
.task-meta { font-size:11px; color:var(--text2); margin-top:3px; display:flex; gap:10px; flex-wrap:wrap; }
.files-section { margin-top:8px; }
.file-drop { border:2px dashed var(--border); border-radius:10px; padding:20px; text-align:center; cursor:pointer; }
.file-drop:hover { border-color:var(--accent); background:#f0f4ff; }
.file-drop-text { font-size:12px; color:var(--text2); }
.file-list { margin-top:10px; display:flex; flex-direction:column; gap:6px; }
.file-item { display:flex; align-items:center; gap:10px; background:var(--hover); border-radius:8px; padding:8px 12px; border:1px solid var(--border); }
.file-icon { font-size:18px; }
.file-name { font-size:12px; font-weight:600; flex:1; }
.file-size { font-size:11px; color:var(--text2); }
.file-del { cursor:pointer; color:var(--danger); }
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:200; display:none; align-items:center; justify-content:center; }
.modal-overlay.open { display:flex; }
.modal { background:var(--white); border-radius:16px; padding:28px; width:500px; max-width:95vw; max-height:90vh; overflow-y:auto; }
.modal h3 { font-size:18px; font-weight:700; margin-bottom:20px; }
.form-group { margin-bottom:14px; }
.form-label { font-size:12px; font-weight:600; color:var(--text2); margin-bottom:5px; display:block; }
.form-control { width:100%; padding:9px 12px; border:1px solid var(--border); border-radius:8px; font-size:13px; font-family:inherit; background:#fff; outline:none; }
.form-control:focus { border-color:var(--accent); }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.modal-actions { display:flex; gap:10px; justify-content:flex-end; margin-top:20px; }
.toast { position:fixed; bottom:24px; left:24px; background:#1e293b; color:#fff; padding:12px 20px; border-radius:10px; font-size:13px; z-index:999; transform:translateY(100px); transition:transform .3s; display:flex; align-items:center; gap:10px; }
.toast.show { transform:translateY(0); }
.login-wrap { width:100vw; height:100vh; display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg,#1a1f2e 0%,#252b3b 100%); }
.login-card { background:#fff; border-radius:20px; padding:40px; width:380px; }
.login-logo { text-align:center; margin-bottom:30px; }
.login-logo-text { font-size:36px; font-weight:900; color:var(--accent); }
.login-logo-sub { font-size:13px; color:var(--text2); }
.login-title { font-size:22px; font-weight:700; margin-bottom:6px; }
.login-sub { font-size:13px; color:var(--text2); margin-bottom:24px; }
.login-error { background:#fef2f2; color:var(--danger); padding:10px 14px; border-radius:8px; font-size:13px; margin-bottom:16px; display:none; }
.empty-state { text-align:center; padding:60px 20px; color:var(--text2); }
.empty-state .es-icon { font-size:48px; margin-bottom:16px; }
.empty-state .es-title { font-size:16px; font-weight:700; color:var(--text); margin-bottom:6px; }
.empty-state .es-sub { font-size:13px; }
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:#cbd5e1; border-radius:3px; }
@media (max-width:900px) { .record-body { grid-template-columns:1fr; } .stats-grid { grid-template-columns:1fr 1fr; } }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginPage" class="login-wrap">
  <div class="login-card">
    <div class="login-logo"><div class="login-logo-text">ROI</div><div class="login-logo-sub">מערכת CRM</div></div>
    <div class="login-title">ברוך הבא 👋</div>
    <div class="login-sub">התחבר כדי להמשיך</div>
    <div class="login-error" id="loginError">שם משתמש או סיסמא שגויים</div>
    <div class="form-group"><label class="form-label">שם משתמש</label><input class="form-control" id="loginUser" type="text" placeholder="roi" dir="ltr"></div>
    <div class="form-group"><label class="form-label">סיסמא</label><input class="form-control" id="loginPass" type="password" placeholder="••••••••" dir="ltr"></div>
    <button class="btn btn-primary" style="width:100%;justify-content:center;padding:11px;" onclick="doLogin()">התחבר</button>
  </div>
</div>

<div id="app" style="display:none;width:100%;flex-direction:row;height:100vh;">
<div class="sidebar">
  <div class="logo"><div class="logo-title">ROI</div><div class="logo-sub">CRM מערכת</div></div>
  <nav class="nav">
    <div class="nav-section">ראשי</div>
    <div class="nav-item active" onclick="showPage('dashboard')"><span class="icon">📊</span> דאשבורד</div>
    <div class="nav-section">ניהול</div>
    <div class="nav-item" onclick="showPage('leads')"><span class="icon">⭐</span> מתעניינים<span class="nav-badge" id="badge-leads">0</span></div>
    <div class="nav-item" onclick="showPage('deals')"><span class="icon">💼</span> עסקאות<span class="nav-badge" id="badge-deals">0</span></div>
    <div class="nav-item" onclick="showPage('clients')"><span class="icon">👥</span> לקוחות<span class="nav-badge" id="badge-clients">0</span></div>
    <div class="nav-item" onclick="showPage('payments')"><span class="icon">💰</span> תשלומים<span class="nav-badge" id="badge-payments">0</span></div>
    <div class="nav-item" onclick="showPage('products')"><span class="icon">🛍️</span> מוצרים<span class="nav-badge" id="badge-products">0</span></div>
    <div class="nav-item" onclick="showPage('meetings')"><span class="icon">📅</span> פגישות<span class="nav-badge" id="badge-meetings">0</span></div>
    <div class="nav-item" onclick="showPage('tasks')"><span class="icon">✅</span> משימות<span class="nav-badge" id="badge-tasks">0</span></div>
    <div class="nav-section">מערכת</div>
    <div class="nav-item" onclick="showPage('settings')"><span class="icon">⚙️</span> הגדרות</div>
  </nav>
  <div class="user-bar"><div class="user-avatar" id="userAvatar">ר</div><div><div class="user-name" id="userName">רועי עובדיה</div><div class="user-role">מנהל מערכת</div></div></div>
</div>
<div class="main">
  <div class="topbar">
    <div class="page-title" id="pageTitle">דאשבורד</div>
    <div class="topbar-actions">
      <button class="btn btn-secondary btn-sm" id="exportBtn" onclick="exportData()" style="display:none">⬇️ ייצוא</button>
      <button class="btn btn-primary" id="addBtn" onclick="openAddModal()" style="display:none">+ הוסף</button>
      <button class="btn btn-secondary btn-sm" onclick="doLogout()">🚪 יציאה</button>
    </div>
  </div>
  <div class="content" id="mainContent"></div>
</div>
</div>

<div class="record-overlay" id="recordOverlay">
  <div class="record-panel">
    <div class="record-topbar">
      <span class="record-back" onclick="closeRecord()">✕</span>
      <div class="record-title-bar"><div class="record-name" id="recordName">—</div><div class="record-type" id="recordType">—</div></div>
      <div style="display:flex;gap:8px;"><button class="btn btn-success btn-sm" onclick="saveRecord()">💾 שמור</button><button class="btn btn-danger btn-sm" onclick="deleteRecord()">🗑️ מחק</button></div>
    </div>
    <div class="record-body">
      <div class="record-fields" id="recordFields"></div>
      <div class="record-notes-col" id="recordNotesCol"></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3 id="modalTitle">הוסף</h3>
    <div id="modalBody"></div>
    <div class="modal-actions"><button class="btn btn-secondary" onclick="closeModal()">ביטול</button><button class="btn btn-primary" onclick="saveModal()">שמור</button></div>
  </div>
</div>

<div class="toast" id="toast"><span class="toast-icon">✅</span><span id="toastMsg">נשמר בהצלחה</span></div>

<script>
const USERS = {'roi':{pass:'Roi2024!',name:'רועי עובדיה',role:'מנהל מערכת',avatar:'ר'},'natan':{pass:'Natan2024!',name:'נתן',role:'נציג מכירות',avatar:'נ'},'ben':{pass:'Ben2024!',name:'בן',role:'נציג מכירות',avatar:'ב'}};
function loadData(){try{return JSON.parse(localStorage.getItem('roicrm_v3')||'null')||defaultData();}catch(e){return defaultData();}}
function saveData(){localStorage.setItem('roicrm_v3',JSON.stringify(DB));updateBadges();}
function defaultData(){return{leads:[],deals:[],clients:[],payments:[],products:[{id:genId(),name:'ליווי מחירות',price:5000,desc:'ליווי מחירות מלא',notes:[],tasks:[],files:[],created:new Date().toISOString()},{id:genId(),name:'קורס דיגיטל',price:2000,desc:'קורס שיווק דיגיטלי',notes:[],tasks:[],files:[],created:new Date().toISOString()}],meetings:[],tasks:[]};}
let DB=loadData(),currentUser=null,currentPage='dashboard',currentRecord=null,currentRecordType=null,modalMode=null,modalType=null,modalParent=null;
function genId(){return Date.now().toString(36)+Math.random().toString(36).substr(2,5);}
function fmt(d){if(!d)return'—';const dt=new Date(d);return isNaN(dt)?d:dt.toLocaleDateString('he-IL');}
function fmtMoney(n){return'₪'+(Number(n)||0).toLocaleString();}
function now(){return new Date().toISOString();}
function userName(){return currentUser?.name||'משתמש';}
function doLogin(){
  const u=document.getElementById('loginUser').value.trim().toLowerCase();
  const p=document.getElementById('loginPass').value;
  const user=USERS[u];
  if(user&&user.pass===p){currentUser={...user,username:u};document.getElementById('loginPage').style.display='none';document.getElementById('app').style.display='flex';document.getElementById('userName').textContent=user.name;document.getElementById('userAvatar').textContent=user.avatar;document.getElementById('loginError').style.display='none';sessionStorage.setItem('roicrm_user',JSON.stringify({...user,username:u}));showPage('dashboard');}else{document.getElementById('loginError').style.display='block';}
}
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&document.getElementById('loginPage').style.display!=='none')doLogin();});
function doLogout(){sessionStorage.removeItem('roicrm_user');currentUser=null;document.getElementById('loginPage').style.display='flex';document.getElementById('app').style.display='none';}
const PAGE_TITLES={dashboard:'דאשבורד',leads:'מתעניינים',deals:'עסקאות',clients:'לקוחות',payments:'תשלומים',products:'מוצרים',meetings:'פגישות',tasks:'משימות',settings:'הגדרות'};
const PAGE_ICONS={leads:'⭐',deals:'💼',clients:'👥',payments:'💰',products:'🛍️',meetings:'📅',tasks:'✅'};
const ADD_LABELS={leads:'מתעניין חדש',deals:'עסקה חדשה',clients:'לקוח חדש',payments:'תשלום חדש',products:'מוצר חדש',meetings:'פגישה חדשה',tasks:'משימה חדשה'};
function showPage(page){
  currentPage=page;
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(el=>{if(el.textContent.includes(PAGE_TITLES[page]))el.classList.add('active');});
  document.getElementById('pageTitle').textContent=PAGE_TITLES[page]||page;
  const hasList=['leads','deals','clients','payments','products','meetings','tasks'].includes(page);
  document.getElementById('addBtn').style.display=hasList?'flex':'none';
  document.getElementById('addBtn').textContent='+ '+(ADD_LABELS[page]||'הוסף');
  document.getElementById('exportBtn').style.display=hasList?'flex':'none';
  renderPage(page);updateBadges();
}
function updateBadges(){

  if(type==='deals')return`<div class="form-group"><label class="form-label">שם עסקה *</label><input class="form-control" id="f-name"></div><div class="form-row"><div class="form-group"><label class="form-label">סכום</label><input class="form-control" id="f-amount" type="number"></div><div class="form-group"><label class="form-label">מוצר</label><select class="form-control" id="f-product">${pOpts}</select></div></div><div class="form-row"><div class="form-group"><label class="form-label">שם לקוח</label><input class="form-control" id="f-clientName" value="${modalParent?.name||''}"></div><div class="form-group"><label class="form-label">סטטוס</label><select class="form-control" id="f-status"><option>חדשה</option><option>בתהליך</option><option>סגורה</option><option>בוטלה</option></select></div></div><div class="form-group"><label class="form-label">תאריך סגירה</label><input class="form-control" id="f-closeDate" type="date"></div>`;
  if(type==='clients')return`<div class="form-row"><div class="form-group"><label class="form-label">שם מלא *</label><input class="form-control" id="f-name"></div><div class="form-group"><label class="form-label">טלפון</label><input class="form-control" id="f-phone" type="tel"></div></div><div class="form-row"><div class="form-group"><label class="form-label">אימייל</label><input class="form-control" id="f-email" type="email"></div><div class="form-group"><label class="form-label">ת.ז</label><input class="form-control" id="f-idNumber"></div></div><div class="form-row"><div class="form-group"><label class="form-label">עיר</label><input class="form-control" id="f-city"></div><div class="form-group"><label class="form-label">סטטוס</label><select class="form-control" id="f-status"><option>פעיל</option><option>לא פעיל</option></select></div></div>`;
  if(type==='payments')return`<div class="form-row"><div class="form-group"><label class="form-label">שם לקוח *</label><input class="form-control" id="f-clientName" value="${modalParent?.name||''}"></div><div class="form-group"><label class="form-label">סכום</label><input class="form-control" id="f-amount" type="number"></div></div><div class="form-row"><div class="form-group"><label class="form-label">תאריך גבייה</label><input class="form-control" id="f-date" type="date"></div><div class="form-group"><label class="form-label">בנק</label><input class="form-control" id="f-bank"></div></div><div class="form-row"><div class="form-group"><label class="form-label">אמצעי תשלום</label><select class="form-control" id="f-method"><option>העברה בנקאית</option><option>המחאה</option><option>אשראי</option><option>מזומן</option><option>ביט</option><option>פייבוקס</option></select></div><div class="form-group"><label class="form-label">מוצר</label><select class="form-control" id="f-product">${pOpts}</select></div></div><div class="form-row"><div class="form-group"><label class="form-label">תאריך המחאה</label><input class="form-control" id="f-checkDate" type="date"></div><div class="form-group"><label class="form-label">גבה אותו</label><input class="form-control" id="f-collector"></div></div><div class="form-group"><label class="form-label">סטטוס</label><select class="form-control" id="f-status"><option>ממתין</option><option>שולם</option><option>בוטל</option></select></div>`;
  if(type==='products')return`<div class="form-row"><div class="form-group"><label class="form-label">שם מוצר *</label><input class="form-control" id="f-name"></div><div class="form-group"><label class="form-label">מחיר</label><input class="form-control" id="f-price" type="number"></div></div><div class="form-group"><label class="form-label">תיאור</label><textarea class="form-control" id="f-desc" rows="3"></textarea></div>`;
  if(type==='meetings')return`<div class="form-group"><label class="form-label">נושא *</label><input class="form-control" id="f-title"></div><div class="form-row"><div class="form-group"><label class="form-label">עם מי</label><input class="form-control" id="f-withName" value="${modalParent?.name||''}"></div><div class="form-group"><label class="form-label">מיקום</label><input class="form-control" id="f-location"></div></div><div class="form-row"><div class="form-group"><label class="form-label">תאריך</label><input class="form-control" id="f-date" type="date"></div><div class="form-group"><label class="form-label">שעה</label><input class="form-control" id="f-time" type="time"></div></div><div class="form-group"><label class="form-label">סטטוס</label><select class="form-control" id="f-status"><option>מתוכננת</option><option>בוצעה</option><option>בוטלה</option></select></div>`;
  if(type==='tasks')return`<div class="form-group"><label class="form-label">משימה *</label><input class="form-control" id="f-name"></div><div class="form-row"><div class="form-group"><label class="form-label">מבצע</label><select class="form-control" id="f-assignee">${uOpts}</select></div><div class="form-group"><label class="form-label">תאריך ביצוע</label><input class="form-control" id="f-dueDate" type="date"></div></div><div class="form-group"><label class="form-label">תאריך תזכורת</label><input class="form-control" id="f-reminderDate" type="date"></div>`;
  return'';
}
function saveModal(){
  const type=modalType;if(!type)return;
  const id=genId();let item={id,created:now(),notes:[],tasks:[],files:[]};
  const req=(fid,msg)=>{const v=g(fid).trim();if(!v){showToast(msg+' ❌');return null;}return v;};
  if(type==='leads'){const name=req('f-name','שם הוא שדה חובה');if(!name)return;item={...item,name,phone:g('f-phone'),email:g('f-email'),city:g('f-city'),status:g('f-status'),source:g('f-source')};}
  else if(type==='deals'){const name=req('f-name','שם הוא שדה חובה');if(!name)return;const prod=DB.products.find(p=>p.id===g('f-product'));item={...item,name,amount:g('f-amount'),clientName:g('f-clientName'),status:g('f-status'),closeDate:g('f-closeDate'),productId:g('f-product'),productName:prod?.name||''};if(modalParent){item.leadId=modalParent.id;item.leadName=modalParent.name;}}
  else if(type==='clients'){const name=req('f-name','שם הוא שדה חובה');if(!name)return;item={...item,name,phone:g('f-phone'),email:g('f-email'),city:g('f-city'),status:g('f-status'),idNumber:g('f-idNumber')};if(modalParent){item.dealId=modalParent.id;}}
  else if(type==='payments'){const cn=req('f-clientName','שם לקוח הוא שדה חובה');if(!cn)return;const prod=DB.products.find(p=>p.id===g('f-product'));item={...item,clientName:cn,amount:g('f-amount'),date:g('f-date'),bank:g('f-bank'),method:g('f-method'),status:g('f-status'),checkDate:g('f-checkDate'),collector:g('f-collector'),productId:g('f-product'),productName:prod?.name||''};if(modalParent){item.dealId=modalParent.id;item.clientId=modalParent.id;}}
  else if(type==='products'){const name=req('f-name','שם הוא שדה חובה');if(!name)return;item={...item,name,price:g('f-price'),desc:g('f-desc')};}
  else if(type==='meetings'){const title=req('f-title','נושא הוא שדה חובה');if(!title)return;item={...item,title,name:title,withName:g('f-withName'),location:g('f-location'),date:g('f-date'),time:g('f-time'),status:g('f-status')};if(modalParent){item[modalParent.type+'Id']=modalParent.id;item[modalParent.type+'Name']=modalParent.name;}}
  else if(type==='tasks'){const name=req('f-name','שם הוא שדה חובה');if(!name)return;item={...item,name,assignee:g('f-assignee'),dueDate:g('f-dueDate'),reminderDate:g('f-reminderDate'),done:false};}
  if(!DB[type])DB[type]=[];
  DB[type].push(item);saveData();closeModal();showToast('נוסף בהצלחה ✅');
  if(currentRecordType&&currentRecord){const rec=DB[currentRecordType].find(r=>r.id===currentRecord.id);if(rec){currentRecord={...rec};document.getElementById('recordFields').innerHTML=renderRecordFields(currentRecordType,currentRecord);}}else{renderPage(currentPage);}
}
function deleteItem(type,id){if(!confirm('למחוק?'))return;DB[type]=DB[type].filter(r=>r.id!==id);saveData();renderPage(currentPage);showToast('נמחק ✅');}
function exportData(){
  const data=DB[currentPage]||[];if(!data.length){showToast('אין נתונים לייצוא');return;}
  const cfg=LIST_CONFIGS[currentPage];if(!cfg)return;
  const csv='\uFEFF'+cfg.cols.join(',')+'\n'+data.map(r=>cfg.fields(r).map(f=>'"'+f.replace(/<[^>]+>/g,'').replace(/,/g,'')+'"').join(',')).join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));a.download=currentPage+'_export.csv';a.click();showToast('ייצוא הושלם ✅');
}
function renderSettings(){
  return `<div style="max-width:600px"><div class="dash-card" style="margin-bottom:16px"><div class="dash-card-title">⚙️ הגדרות</div><div class="form-group"><label class="form-label">שם העסק</label><input class="form-control" value="ROI"></div><button class="btn btn-primary" onclick="showToast('נשמר ✅')" style="margin-top:8px">שמור</button></div>
  <div class="dash-card" style="margin-bottom:16px"><div class="dash-card-title">🗂️ גיבוי</div><div style="display:flex;gap:10px;margin-top:8px"><button class="btn btn-secondary" onclick="backupData()">⬇️ גיבוי JSON</button><button class="btn btn-secondary" onclick="document.getElementById('restoreFile').click()">⬆️ שחזור</button><input type="file" id="restoreFile" accept=".json" style="display:none" onchange="restoreData(event)"><button class="btn btn-danger" onclick="clearAll()">🗑️ מחק הכל</button></div></div>
  <div class="dash-card"><div class="dash-card-title">📊 סטטיסטיקות</div>${Object.keys(DB).map(k=>Array.isArray(DB[k])?`<div class="status-row"><span class="status-label">${PAGE_ICONS[k]||'📋'} ${PAGE_TITLES[k]||k}</span><span class="status-count">${DB[k].length}</span></div>`:'').filter(Boolean).join('')}</div></div>`;
}
function backupData(){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(DB,null,2)],{type:'application/json'}));a.download='roi_crm_backup.json';a.click();showToast('גיבוי הורד ✅');}
function restoreData(e){const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=ev=>{try{DB=JSON.parse(ev.target.result);saveData();showPage(currentPage);showToast('שוחזר ✅');}catch(err){showToast('קובץ שגוי ❌');}};reader.readAsText(file);}
function clearAll(){if(!confirm('למחוק את כל הנתונים?'))return;DB=defaultData();saveData();showPage(currentPage);showToast('נמחק הכל ✅');}
function showToast(msg){const t=document.getElementById('toast');document.getElementById('toastMsg').textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800);}
// INIT
updateBadges();
const savedUser=sessionStorage.getItem('roicrm_user');
if(savedUser){try{const u=JSON.parse(savedUser);currentUser=u;document.getElementById('loginPage').style.display='none';document.getElementById('app').style.display='flex';document.getElementById('userName').textContent=u.name;document.getElementById('userAvatar').textContent=u.avatar;showPage('dashboard');}catch(e){}}
</script>
</body>
</html>
